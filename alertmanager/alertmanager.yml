# =============================================================================
# Alertmanager Configuration — Post Fiat Validator Monitor
# =============================================================================
#
# Routes:
#   critical → discord-critical + pagerduty (immediate)
#   warning  → discord-warnings (5m group wait)
#   info     → discord-info (15m group wait)
#
# Configure your webhook URLs below.
# Discord webhooks work natively with Alertmanager via webhook_configs
# using a small adapter, or use the /api/v1/alerts Slack-compatible mode.
#
# =============================================================================

global:
  resolve_timeout: 5m
  # Uncomment for Slack:
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

route:
  receiver: "discord-default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts → immediate, short repeat
    - match:
        severity: critical
      receiver: "discord-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: true

    # Also page for critical
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      group_wait: 10s
      continue: false

    # Warnings
    - match:
        severity: warning
      receiver: "discord-warnings"
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 4h

    # Info
    - match:
        severity: info
      receiver: "discord-info"
      group_wait: 15m
      repeat_interval: 24h

receivers:
  # ── Discord (via webhook) ───────────────────────────────────
  # Alertmanager doesn't have native Discord support.
  # Use one of:
  #   1. alertmanager-discord adapter: https://github.com/benjojo/alertmanager-discord
  #   2. Slack-compatible webhook (Discord supports /slack endpoint on webhooks)
  #
  # For Slack-compatible mode, append /slack to your Discord webhook URL:
  #   https://discord.com/api/webhooks/ID/TOKEN/slack

  - name: "discord-critical"
    slack_configs:
      - send_resolved: true
        # Discord webhook URL with /slack appended for Slack compatibility
        api_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN/slack"
        channel: "#validator-alerts"
        title: '🔴 CRITICAL: {{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          ---
          {{ end }}
        color: '#FF0000'

  - name: "discord-warnings"
    slack_configs:
      - send_resolved: true
        api_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN/slack"
        channel: "#validator-alerts"
        title: '⚠️ WARNING: {{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          ---
          {{ end }}
        color: '#FFA500'

  - name: "discord-info"
    slack_configs:
      - send_resolved: true
        api_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN/slack"
        channel: "#validator-info"
        title: 'ℹ️ {{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}
        color: '#3B82F6'

  - name: "discord-default"
    slack_configs:
      - send_resolved: true
        api_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN/slack"
        channel: "#validator-alerts"
        title: '{{ .CommonAnnotations.summary }}'
        text: >-
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}

  # ── PagerDuty (for critical on-call) ────────────────────────
  # Uncomment and add your integration key:
  - name: "pagerduty-critical"
    # pagerduty_configs:
    #   - routing_key: "YOUR_PAGERDUTY_INTEGRATION_KEY"
    #     severity: critical
    #     description: '{{ .CommonAnnotations.summary }}'
    #     details:
    #       firing: '{{ .Alerts.Firing | len }}'
    #       resolved: '{{ .Alerts.Resolved | len }}'
    webhook_configs: []  # placeholder until PagerDuty is configured

  # ── Slack (native, if preferred over Discord) ───────────────
  # Uncomment to use Slack directly:
  # - name: "slack-critical"
  #   slack_configs:
  #     - channel: "#validator-alerts"
  #       send_resolved: true
  #       title: '🔴 {{ .CommonAnnotations.summary }}'
  #       text: >-
  #         {{ range .Alerts }}
  #         *{{ .Annotations.summary }}*
  #         {{ .Annotations.description }}
  #         {{ end }}

# ── Inhibition rules ──────────────────────────────────────────
# Suppress warnings when critical is already firing for same alert
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

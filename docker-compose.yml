# =============================================================================
# Post Fiat Validator Monitoring Stack
# =============================================================================
#
#   Prometheus  →  scrapes all exporters every 15s
#   Grafana     →  pre-provisioned dashboards + datasource
#   Alertmanager → Discord / Slack / PagerDuty routing
#   postfiatd_exporter → custom XRPL/PF metrics from JSON-RPC
#   node_exporter      → host system metrics (CPU, RAM, disk, net)
#   cadvisor           → Docker container metrics
#
#   Deploy:
#     cp .env.example .env && nano .env
#     docker compose up -d
#
# =============================================================================

services:

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pf-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    depends_on:
      - postfiatd-exporter
      - node-exporter
      - cadvisor

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: pf-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-postfiat}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/pf-overview.json
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - grafana_data:/var/lib/grafana

  # ── Alertmanager ────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pf-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # ── Post Fiat Exporter (custom) ────────────────────────────────
  postfiatd-exporter:
    build:
      context: ./exporters
      dockerfile: Dockerfile
    container_name: pf-postfiatd-exporter
    restart: unless-stopped
    ports:
      - "9750:9750"
    volumes:
      # Mount config dir read-only for file integrity checks
      - ${POSTFIATD_CONFIG_DIR:-/opt/postfiatd}:/opt/postfiatd:ro
    environment:
      - PF_RPC_URL=${POSTFIATD_RPC_URL:-http://host.docker.internal:5005}
      - PF_ADMIN_RPC_URL=${POSTFIATD_ADMIN_RPC_URL:-}
    command: >
      python postfiatd_exporter.py
        --rpc-url ${POSTFIATD_RPC_URL:-http://host.docker.internal:5005}
        ${POSTFIATD_ADMIN_RPC_URL:+--admin-rpc-url ${POSTFIATD_ADMIN_RPC_URL}}
        --port 9750
        --interval 15
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Node Exporter (system metrics) ─────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: pf-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - "/:/host:ro,rslave"

  # ── cAdvisor (Docker container metrics) ─────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: pf-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg

  # ── Optional: statsd_exporter (if you enable [insight] in postfiatd) ──
  # Uncomment if your postfiatd.cfg has:
  #   [insight]
  #   server=statsd
  #   address=<this-host>:9125
  #   prefix=postfiatd
  #
  # statsd-exporter:
  #   image: prom/statsd-exporter:v0.26.1
  #   container_name: pf-statsd-exporter
  #   restart: unless-stopped
  #   ports:
  #     - "9125:9125/udp"
  #     - "9102:9102"
  #   volumes:
  #     - ./exporters/statsd_mapping.yml:/tmp/statsd_mapping.yml:ro
  #   command:
  #     - "--statsd.mapping-config=/tmp/statsd_mapping.yml"
  #     - "--statsd.listen-udp=:9125"

volumes:
  prometheus_data:
  grafana_data:

# =============================================================================
# Prometheus Configuration — Post Fiat Validator Monitor
# =============================================================================
# DO NOT EDIT — this is a template. Run ./setup.sh to generate prometheus.yml
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: "postfiat-validator"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postfiatd"
    scrape_interval: 15s
    static_configs:
      - targets: ["VALIDATOR_HOST_IP:9750"]
        labels:
          instance: "validator"

  - job_name: "node"
    scrape_interval: 15s
    static_configs:
      - targets: ["VALIDATOR_HOST_IP:9100"]
        labels:
          instance: "validator-host"

  - job_name: "cadvisor"
    scrape_interval: 30s
    static_configs:
      - targets: ["VALIDATOR_HOST_IP:8080"]
        labels:
          instance: "validator-docker"

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
